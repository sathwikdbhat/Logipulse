# LogiPulse — Application Properties
server.port=${PORT:9090}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.application.name=logipulse
logging.level.org.springframework.security=WARN
logging.level.com.logipulse=INFO
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

#---
spring.config.activate.on-profile=local

# Neon PostgreSQL (get URL from https://neon.tech). To use local H2 instead, swap in the commented lines below.
spring.datasource.url=jdbc:postgresql://ep-plain-breeze-aomp3i4w-pooler.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_A1yKkzfQ8tgl

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#spring.datasource.url=jdbc:h2:file:./data/logipulsedb;AUTO_SERVER=TRUE
#spring.datasource.username=sa
#spring.datasource.password=password
#spring.datasource.driver-class-name=org.h2.Driver
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#spring.h2.console.enabled=true

# Schema is created manually in Neon (see neon_schema.sql) — Hibernate only validates it matches
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Session cookie — works on localhost HTTP + ngrok HTTPS
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.max-age=86400
server.forward-headers-strategy=framework

# Quiet noisy logs
logging.level.com.logipulse.service.RouteGeometryService=WARN
logging.level.com.logipulse.service.NewsService=WARN
logging.level.org.hibernate.orm.deprecation=ERROR
logging.level.com.zaxxer.hikari.pool.PoolBase=ERROR
logging.level.org.springframework.security.config.annotation.authentication.configuration=ERROR

# HikariCP — tuned to avoid Neon idle connection drops
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.max-lifetime=180000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000

#---
spring.config.activate.on-profile=prod

# PostgreSQL — Render provides DATABASE_URL
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.h2.console.enabled=false
